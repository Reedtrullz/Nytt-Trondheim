name: Deploy to VPS

permissions:
  actions: read
  contents: read

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Nytt Trondheim
    environment: production
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (vars.NYTT_DEPLOY_ENABLED == 'true' && github.event.workflow_run.conclusion == 'success') }}
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      NYTT_REPO_DEPLOY_KEY: ${{ secrets.NYTT_REPO_DEPLOY_KEY }}
      NYTT_POSTGRES_PASSWORD: ${{ secrets.NYTT_POSTGRES_PASSWORD }}
      NYTT_SESSION_SECRET: ${{ secrets.NYTT_SESSION_SECRET }}
      NYTT_GITHUB_CLIENT_ID: ${{ secrets.NYTT_GITHUB_CLIENT_ID }}
      NYTT_GITHUB_CLIENT_SECRET: ${{ secrets.NYTT_GITHUB_CLIENT_SECRET }}
      NYTT_SMTP_HOST: ${{ secrets.NYTT_SMTP_HOST }}
      NYTT_SMTP_PORT: ${{ secrets.NYTT_SMTP_PORT }}
      NYTT_SMTP_SECURE: ${{ secrets.NYTT_SMTP_SECURE }}
      NYTT_SMTP_FROM: ${{ secrets.NYTT_SMTP_FROM }}
      NYTT_SMTP_USER: ${{ secrets.NYTT_SMTP_USER }}
      NYTT_SMTP_API_KEY: ${{ secrets.NYTT_SMTP_API_KEY }}
      NYTT_WEB_PUSH_VAPID_PUBLIC_KEY: ${{ secrets.NYTT_WEB_PUSH_VAPID_PUBLIC_KEY }}
      NYTT_WEB_PUSH_VAPID_PRIVATE_KEY: ${{ secrets.NYTT_WEB_PUSH_VAPID_PRIVATE_KEY }}
      NYTT_WEB_PUSH_SUBJECT: ${{ vars.NYTT_WEB_PUSH_SUBJECT }}
      NYTT_POLITILOGGEN_ENABLED: ${{ vars.NYTT_POLITILOGGEN_ENABLED }}
      NYTT_ENTUR_CLIENT_NAME: ${{ vars.NYTT_ENTUR_CLIENT_NAME }}
      NYTT_ENTUR_CODESPACES: ${{ vars.NYTT_ENTUR_CODESPACES }}
      NYTT_ENTUR_VEHICLE_BOUNDS: ${{ vars.NYTT_ENTUR_VEHICLE_BOUNDS }}
      NYTT_COVERAGE_PROJECTION_MODE: ${{ vars.NYTT_COVERAGE_PROJECTION_MODE }}
      NYTT_COVERAGE_CORRECTIONS_ENABLED: ${{ vars.NYTT_COVERAGE_CORRECTIONS_ENABLED }}
      NYTT_COVERAGE_MATCHER_VERSION: ${{ vars.NYTT_COVERAGE_MATCHER_VERSION }}
      NYTT_COVERAGE_GENERATION_MODE: ${{ vars.NYTT_COVERAGE_GENERATION_MODE }}
      NYTT_COVERAGE_ACTIVE_MIN_ARTICLES: ${{ vars.NYTT_COVERAGE_ACTIVE_MIN_ARTICLES }}
      NYTT_COVERAGE_ACTIVE_MIN_PREVIOUS_RATIO: ${{ vars.NYTT_COVERAGE_ACTIVE_MIN_PREVIOUS_RATIO }}
      NYTT_COVERAGE_ACTIVE_VOLUME_GUARD_OVERRIDE: ${{ vars.NYTT_COVERAGE_ACTIVE_VOLUME_GUARD_OVERRIDE }}
      COVERAGE_V2_OWNER_REVIEWED_GENERATION_ID: ${{ vars.COVERAGE_V2_OWNER_REVIEWED_GENERATION_ID }}
      NYTT_DEPLOY_REF: ${{ github.event.workflow_run.head_sha || github.sha }}
      NYTT_DATEX_ENDPOINT: ${{ secrets.NYTT_DATEX_ENDPOINT }}
      NYTT_DATEX_USERNAME: ${{ secrets.NYTT_DATEX_USERNAME }}
      NYTT_DATEX_PASSWORD: ${{ secrets.NYTT_DATEX_PASSWORD }}
      NYTT_RESTIC_REPOSITORY: ${{ secrets.NYTT_RESTIC_REPOSITORY }}
      NYTT_RESTIC_PASSWORD: ${{ secrets.NYTT_RESTIC_PASSWORD }}
      NYTT_RCLONE_CONFIG: ${{ secrets.NYTT_RCLONE_CONFIG }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.NYTT_DEPLOY_REF }}
      - name: Require successful exact-SHA CI
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          successful_runs="$(gh run list --workflow CI --commit "$NYTT_DEPLOY_REF" --status completed \
            --json conclusion --jq 'map(select(.conclusion == "success")) | length')"
          test "$successful_runs" -ge 1
      - name: Require production deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          required=(
            SSH_PRIVATE_KEY
            NYTT_REPO_DEPLOY_KEY
            NYTT_POSTGRES_PASSWORD
            NYTT_SESSION_SECRET
            NYTT_GITHUB_CLIENT_ID
            NYTT_GITHUB_CLIENT_SECRET
            NYTT_SMTP_HOST
            NYTT_SMTP_FROM
            NYTT_SMTP_API_KEY
            NYTT_DATEX_USERNAME
            NYTT_DATEX_PASSWORD
            NYTT_RESTIC_REPOSITORY
            NYTT_RESTIC_PASSWORD
            NYTT_RCLONE_CONFIG
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required deployment secret: ${name}"
              exit 1
            fi
          done
      - name: Install Ansible
        timeout-minutes: 5
        run: |
          python3 -m pip install --user --disable-pip-version-check "ansible-core>=2.16,<2.20"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/ansible-playbook" --version
      - name: Install Docker collection
        run: ansible-galaxy collection install community.docker
      - name: Configure deployment SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa_racknerd
          chmod 600 ~/.ssh/id_rsa_racknerd
          ssh-keyscan -H 198.23.137.16 >> ~/.ssh/known_hosts
      - name: Smoke test SSH
        run: ssh -i ~/.ssh/id_rsa_racknerd deploy@198.23.137.16 "echo SSH_OK"
      - name: Pause shadow worker for guarded first v2 promotion
        if: >-
          ${{ env.NYTT_COVERAGE_PROJECTION_MODE == 'normalized-active'
              && env.COVERAGE_V2_OWNER_REVIEWED_GENERATION_ID != '' }}
        shell: bash
        run: |
          ssh -i ~/.ssh/id_rsa_racknerd deploy@198.23.137.16 \
            bash -se -- "$COVERAGE_V2_OWNER_REVIEWED_GENERATION_ID" <<'REMOTE'
          set -euo pipefail
          cd /home/deploy/nytt-trondheim
          reviewed_generation_id="$1"
          active_generation="$(docker compose --env-file .env.production exec -T postgres \
            psql -U nytt -d nytt -qAt -v ON_ERROR_STOP=1 -c \
            "SELECT id FROM coverage_bundle_generations WHERE matcher_version='v2' AND mode='active' AND status='completed' AND is_current AND health_outcome='healthy' ORDER BY completed_at DESC, id DESC LIMIT 1;")"
          if [[ "$active_generation" =~ ^[0-9a-fA-F-]{36}$ ]]; then
            echo "Healthy active v2 generation already exists: $active_generation"
            exit 0
          fi

          docker compose --env-file .env.production stop --timeout 30 worker
          running_worker="$(docker compose --env-file .env.production ps --status running -q worker)"
          if [ -n "$running_worker" ]; then
            echo "::error::Shadow worker is still running after guarded stop"
            exit 1
          fi

          latest_shadow="$(docker compose --env-file .env.production exec -T postgres \
            psql -U nytt -d nytt -qAt -v ON_ERROR_STOP=1 -c \
            "SELECT id FROM coverage_bundle_generations WHERE matcher_version='v2' AND mode='shadow' AND status='completed' ORDER BY completed_at DESC, id DESC LIMIT 1;")"
          if [ "$latest_shadow" != "$reviewed_generation_id" ]; then
            echo "::error::Reviewed generation $reviewed_generation_id is not the latest completed shadow after stopping the worker ($latest_shadow)"
            exit 1
          fi
          echo "Shadow worker stopped; reviewed generation remains latest: $latest_shadow"
          REMOTE
      - name: Run Ansible deployment
        run: >-
          ansible-playbook -i inventory/hosts.yml ansible-playbook.yml
          -e coverage_v2_owner_reviewed_generation_id="${COVERAGE_V2_OWNER_REVIEWED_GENERATION_ID:-}"
      - name: Ensure worker is running after guarded first v2 promotion
        if: >-
          ${{ always()
              && env.NYTT_COVERAGE_PROJECTION_MODE == 'normalized-active'
              && env.COVERAGE_V2_OWNER_REVIEWED_GENERATION_ID != '' }}
        run: >-
          ssh -i ~/.ssh/id_rsa_racknerd deploy@198.23.137.16
          "cd /home/deploy/nytt-trondheim && docker compose --env-file .env.production up -d worker"
