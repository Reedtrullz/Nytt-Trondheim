name: Provision Origin

on:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  provision:
    name: Provision VPS Access and TLS
    runs-on: ubuntu-latest
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      NYTT_REPO_DEPLOY_KEY: ${{ secrets.NYTT_REPO_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v6
      - name: Require bootstrap secrets
        shell: bash
        run: |
          set -euo pipefail
          for name in SSH_PRIVATE_KEY NYTT_REPO_DEPLOY_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required bootstrap secret: ${name}"
              exit 1
            fi
          done
      - name: Install Ansible
        run: sudo apt-get update && sudo apt-get install -y ansible
      - name: Configure bootstrap SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa_racknerd
          chmod 600 ~/.ssh/id_rsa_racknerd
          ssh-keyscan -H 198.23.137.16 >> ~/.ssh/known_hosts
      - name: Smoke test bootstrap SSH
        run: ssh -i ~/.ssh/id_rsa_racknerd deploy@198.23.137.16 "echo SSH_OK"
      - name: Provision permanent access and public TLS route
        run: ansible-playbook -i inventory/hosts.yml origin-bootstrap-playbook.yml -vv
