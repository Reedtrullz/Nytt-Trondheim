---
- name: Deploy Nytt Trondheim to VPS
  hosts: vps
  gather_facts: false
  vars:
    repo_url: "git@github.com:Reedtrullz/Nytt-Trondheim.git"
    app_dir: "/home/deploy/nytt-trondheim"
    app_port: "8090"
    canary_port: "8092"
    public_origin: "https://nytt.reidar.tech"
  pre_tasks:
    - name: Require production deployment values
      ansible.builtin.assert:
        that:
          - lookup('env', item) | length > 0
        fail_msg: "Required deployment value is missing."
      no_log: true
      loop:
        - NYTT_REPO_DEPLOY_KEY
        - NYTT_POSTGRES_PASSWORD
        - NYTT_SESSION_SECRET
        - NYTT_GITHUB_CLIENT_ID
        - NYTT_GITHUB_CLIENT_SECRET
        - NYTT_DEEPSEEK_API_KEY
        - NYTT_DATEX_USERNAME
        - NYTT_DATEX_PASSWORD
        - NYTT_RESTIC_REPOSITORY
        - NYTT_RESTIC_PASSWORD
        - NYTT_RCLONE_CONFIG
  tasks:
    - name: Ensure deploy SSH directory exists
      ansible.builtin.file:
        path: /home/deploy/.ssh
        state: directory
        owner: deploy
        group: deploy
        mode: "0700"

    - name: Authorize dedicated GitHub Actions deployment key
      ansible.builtin.lineinfile:
        path: /home/deploy/.ssh/authorized_keys
        create: true
        owner: deploy
        group: deploy
        mode: "0600"
        line: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPiDoQTHtZg3xUhYEw7w+03s43sfWSJjZGcILoic4f7B nytt-trondheim-actions-vps-20260527"

    - name: Install read-only GitHub repository deploy key
      ansible.builtin.copy:
        dest: /home/deploy/.ssh/nytt_github_deploy
        owner: deploy
        group: deploy
        mode: "0600"
        content: "{{ lookup('env', 'NYTT_REPO_DEPLOY_KEY') }}\n"
      no_log: true

    - name: Ensure app and backup directories exist
      become: true
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: deploy
        group: deploy
        mode: "0750"
      loop:
        - "{{ app_dir }}"
        - "/var/backups/nytt-trondheim"

    - name: Ensure runtime status and restic cache directories exist
      become: true
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: deploy
        group: deploy
        mode: "0755"
      loop:
        - "{{ app_dir }}/runtime-status"
        - "/var/cache/nytt-restic"
        - "/var/lib/nytt-backup"

    - name: Trust GitHub SSH host key for repository checkout
      ansible.builtin.known_hosts:
        path: /home/deploy/.ssh/known_hosts
        name: github.com
        key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 github.com') }}"

    - name: Clone or update repository
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ lookup('env', 'NYTT_DEPLOY_REF') | default('main', true) }}"
        force: true
        key_file: /home/deploy/.ssh/nytt_github_deploy

    - name: Write application secrets file from CI secrets
      ansible.builtin.copy:
        dest: "{{ app_dir }}/.env.production"
        owner: deploy
        group: deploy
        mode: "0600"
        content: |
          NODE_ENV=production
          PORT=8080
          PUBLIC_ORIGIN={{ public_origin }}
          POSTGRES_PASSWORD={{ lookup('env', 'NYTT_POSTGRES_PASSWORD') }}
          DATABASE_URL=postgres://nytt:{{ lookup('env', 'NYTT_POSTGRES_PASSWORD') | urlencode | replace('/', '%2F') }}@postgres:5432/nytt
          SESSION_SECRET={{ lookup('env', 'NYTT_SESSION_SECRET') }}
          GITHUB_CLIENT_ID={{ lookup('env', 'NYTT_GITHUB_CLIENT_ID') }}
          GITHUB_CLIENT_SECRET={{ lookup('env', 'NYTT_GITHUB_CLIENT_SECRET') }}
          GITHUB_ALLOWED_LOGIN=Reedtrullz
          DEEPSEEK_API_KEY={{ lookup('env', 'NYTT_DEEPSEEK_API_KEY') }}
          DEEPSEEK_MODEL=deepseek-v4-flash
          POLITILOGGEN_ENABLED={{ lookup('env', 'NYTT_POLITILOGGEN_ENABLED') | default('true', true) }}
          ENTUR_CLIENT_NAME={{ lookup('env', 'NYTT_ENTUR_CLIENT_NAME') | default('reidar-nytt-trondheim', true) }}
          ENTUR_CODESPACES={{ lookup('env', 'NYTT_ENTUR_CODESPACES') | default('ATB', true) }}
          ENTUR_VEHICLE_BOUNDS={{ lookup('env', 'NYTT_ENTUR_VEHICLE_BOUNDS') | default('63.30,10.20,63.55,10.65', true) }}
          DATEX_ENDPOINT={{ lookup('env', 'NYTT_DATEX_ENDPOINT') | default('', true) }}
          DATEX_USERNAME={{ lookup('env', 'NYTT_DATEX_USERNAME') | default('', true) }}
          DATEX_PASSWORD={{ lookup('env', 'NYTT_DATEX_PASSWORD') | default('', true) }}
          RUNTIME_STATUS_DIR=/data/runtime-status
      no_log: true

    - name: Ensure restore and backup dependencies are installed before database changes
      become: true
      ansible.builtin.apt:
        name:
          - postgresql-client
          - restic
          - rclone
        state: present

    - name: Install encrypted backup scripts before database changes
      become: true
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: "0750"
      loop:
        - { src: "scripts/backup.sh", dest: "/usr/local/bin/nytt-backup" }
        - { src: "scripts/restore-check.sh", dest: "/usr/local/bin/nytt-restore-check" }

    - name: Install backup environment before database changes
      become: true
      ansible.builtin.copy:
        dest: /etc/nytt-backup.env
        owner: root
        group: root
        mode: "0600"
        content: |
          APP_DIR={{ app_dir }}
          RESTIC_REPOSITORY={{ lookup('env', 'NYTT_RESTIC_REPOSITORY') }}
          RESTIC_PASSWORD={{ lookup('env', 'NYTT_RESTIC_PASSWORD') }}
          RCLONE_CONFIG=/etc/nytt-rclone.conf
          RCLONE_TPSLIMIT=4
          RCLONE_TPSLIMIT_BURST=1
          RCLONE_RETRIES=10
          RCLONE_LOW_LEVEL_RETRIES=20
          RCLONE_RETRIES_SLEEP=10s
          RCLONE_DRIVE_PACER_MIN_SLEEP=250ms
          STATUS_DIR={{ app_dir }}/runtime-status
          XDG_CACHE_HOME=/var/cache/nytt-restic
          HOME=/var/lib/nytt-backup
      no_log: true

    - name: Install Google Drive rclone configuration before database changes
      become: true
      ansible.builtin.copy:
        dest: /etc/nytt-rclone.conf
        owner: root
        group: root
        mode: "0600"
        content: "{{ lookup('env', 'NYTT_RCLONE_CONFIG') }}\n"
      no_log: true

    - name: Initialize restic repository when needed
      become: true
      ansible.builtin.shell: |
        set -euo pipefail
        set -a
        . /etc/nytt-backup.env
        set +a
        if ! restic snapshots >/dev/null 2>&1; then
          if restic cat config >/dev/null 2>&1; then
            exit 0
          fi
          init_error="$(mktemp)"
          if restic init 2>"$init_error"; then
            rm -f "$init_error"
            exit 0
          fi
          if grep -q "config file already exists" "$init_error"; then
            rm -f "$init_error"
            exit 0
          fi
          cat "$init_error" >&2
          rm -f "$init_error"
          exit 1
        fi
      args:
        executable: /bin/bash
      changed_when: false

    - name: Retain previous API image before building candidate
      ansible.builtin.shell: docker image tag nytt-trondheim-api:latest nytt-trondheim-api:previous || true
      changed_when: false

    - name: Retain previous worker image before building candidate
      ansible.builtin.shell: docker image tag nytt-trondheim-worker:latest nytt-trondheim-worker:previous || true
      changed_when: false

    - name: Pull base service images
      ansible.builtin.command: docker compose --env-file .env.production pull postgres
      args:
        chdir: "{{ app_dir }}"
      changed_when: true

    - name: Build application images
      ansible.builtin.command: docker compose --env-file .env.production build --pull
      args:
        chdir: "{{ app_dir }}"
      changed_when: true

    - name: Start database
      ansible.builtin.command: docker compose --env-file .env.production up -d postgres
      args:
        chdir: "{{ app_dir }}"
      changed_when: true

    - name: Wait for database readiness before backup and migration
      ansible.builtin.command: docker compose --env-file .env.production exec -T postgres pg_isready -U nytt -d nytt
      args:
        chdir: "{{ app_dir }}"
      register: postgres_readiness
      until: postgres_readiness.rc == 0
      retries: 12
      delay: 5
      changed_when: false

    - name: Allow first database initialization restart to settle
      ansible.builtin.pause:
        seconds: 10

    - name: Confirm stable database readiness before backup and migration
      ansible.builtin.command: docker compose --env-file .env.production exec -T postgres pg_isready -U nytt -d nytt
      args:
        chdir: "{{ app_dir }}"
      register: stable_postgres_readiness
      until: stable_postgres_readiness.rc == 0
      retries: 12
      delay: 5
      changed_when: false

    - name: Ensure persisted uploads volume exists
      ansible.builtin.command: docker volume create nytt_uploads
      changed_when: false

    - name: Ensure API can write persisted uploads and exports
      ansible.builtin.command: docker run --rm -v nytt_uploads:/data alpine chown -R 1000:1000 /data
      changed_when: false

    - name: Create and verify encrypted pre-migration backup
      become: true
      ansible.builtin.shell: |
        set -euo pipefail
        set -a
        . /etc/nytt-backup.env
        set +a
        /usr/local/bin/nytt-backup
        /usr/local/bin/nytt-restore-check
      args:
        executable: /bin/bash
      changed_when: true

    - name: Apply database migrations
      ansible.builtin.command: docker compose --env-file .env.production run --rm migrate
      args:
        chdir: "{{ app_dir }}"
      changed_when: true

    - name: Remove stale canary
      community.docker.docker_container:
        name: nytt-trondheim-canary
        state: absent

    - name: Ensure outbound application network exists for canary
      community.docker.docker_network:
        name: nytt_outbound
        internal: false
        state: present

    - name: Start API canary with production database
      community.docker.docker_container:
        name: nytt-trondheim-canary
        image: nytt-trondheim-api:latest
        state: started
        env_file: "{{ app_dir }}/.env.production"
        env:
          PORT: "8080"
        networks:
          - name: "nytt_database"
          - name: "nytt_outbound"
        published_ports:
          - "127.0.0.1:{{ canary_port }}:8080"

    - name: Wait for canary health
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ canary_port }}/health"
        return_content: true
      register: canary_health
      until:
        - canary_health.status | default(0) == 200
        - (canary_health.json | default({})).get('status') == "ok"
      retries: 12
      delay: 5

    - name: Promote candidate and validate production
      block:
        - name: Promote API and worker
          ansible.builtin.command: docker compose --env-file .env.production up -d app worker
          args:
            chdir: "{{ app_dir }}"
          changed_when: true

        - name: Remove healthy canary
          community.docker.docker_container:
            name: nytt-trondheim-canary
            state: absent

        - name: Configure Caddy reverse proxy
          become: true
          ansible.builtin.blockinfile:
            path: /etc/caddy/Caddyfile
            marker: "# {mark} ANSIBLE MANAGED - Nytt Trondheim"
            block: |
              nytt.reidar.tech {
                reverse_proxy 127.0.0.1:{{ app_port }}
              }

        - name: Validate Caddy configuration
          become: true
          ansible.builtin.command: caddy validate --config /etc/caddy/Caddyfile
          changed_when: false

        - name: Reload validated Caddy
          become: true
          ansible.builtin.systemd:
            name: caddy
            state: reloaded

        - name: Install systemd backup units
          become: true
          ansible.builtin.copy:
            dest: "/etc/systemd/system/{{ item.name }}"
            mode: "0644"
            content: "{{ item.content }}"
          loop:
            - name: nytt-backup.service
              content: |
                [Unit]
                Description=Encrypted backup for Nytt Trondheim
                [Service]
                Type=oneshot
                EnvironmentFile=/etc/nytt-backup.env
                Environment=HOME=/var/lib/nytt-backup
                Environment=BACKUP_APPLY_RETENTION=true
                ExecStart=/usr/local/bin/nytt-backup
            - name: nytt-backup.timer
              content: |
                [Unit]
                Description=Nightly Nytt Trondheim backup
                [Timer]
                OnCalendar=*-*-* 03:15:00
                Persistent=true
                [Install]
                WantedBy=timers.target
            - name: nytt-restore-check.service
              content: |
                [Unit]
                Description=Validate Nytt Trondheim backups
                [Service]
                Type=oneshot
                EnvironmentFile=/etc/nytt-backup.env
                Environment=HOME=/var/lib/nytt-backup
                ExecStart=/usr/local/bin/nytt-restore-check
            - name: nytt-restore-check.timer
              content: |
                [Unit]
                Description=Weekly Nytt Trondheim restore verification
                [Timer]
                OnCalendar=Sun *-*-* 04:15:00
                Persistent=true
                [Install]
                WantedBy=timers.target

        - name: Enable backup timers
          become: true
          ansible.builtin.systemd:
            name: "{{ item }}"
            state: started
            enabled: true
            daemon_reload: true
          loop:
            - nytt-backup.timer
            - nytt-restore-check.timer

        - name: Verify production health
          ansible.builtin.uri:
            url: "https://nytt.reidar.tech/health"
            return_content: true
          register: production_health
          until: (production_health.json | default({})).get('status') == "ok"
          retries: 6
          delay: 5

        - name: Verify worker container is running after candidate promotion
          ansible.builtin.shell: |
            set -euo pipefail
            docker compose --env-file .env.production ps --services --filter status=running worker | grep -qx worker
          args:
            chdir: "{{ app_dir }}"
            executable: /bin/bash
          register: promoted_worker_running
          until: promoted_worker_running.rc == 0
          retries: 6
          delay: 5
          changed_when: false

        - name: Verify traffic source health after candidate promotion
          ansible.builtin.shell: |
            set -euo pipefail
            count="$(docker compose --env-file .env.production exec -T postgres psql -U nytt -d nytt -v ON_ERROR_STOP=1 -Atqc "
              SELECT count(*)
              FROM source_health
              WHERE source IN ('vegvesen_traffic_info','trafikkdata')
                AND state='ok'
                AND last_checked_at > now() - interval '20 minutes';
            ")"
            test "$count" -eq 2
          args:
            chdir: "{{ app_dir }}"
            executable: /bin/bash
          register: traffic_source_health
          until: traffic_source_health.rc == 0
          retries: 12
          delay: 10
          changed_when: false

        - name: Verify DATEX source health rows when DATEX is enabled
          ansible.builtin.shell: |
            set -euo pipefail
            count="$(docker compose --env-file .env.production exec -T postgres psql -U nytt -d nytt -Atqc "
              SELECT count(*)
              FROM source_health
              WHERE source IN ('datex','datex_travel_time')
                AND state='ok'
                AND last_checked_at > now() - interval '30 minutes';
            ")"
            test "$count" -eq 2
          args:
            chdir: "{{ app_dir }}"
            executable: /bin/bash
          register: datex_source_health
          until: datex_source_health.rc == 0
          retries: 12
          delay: 10
          changed_when: false
          when:
            - lookup('env', 'NYTT_DATEX_USERNAME') | length > 0
            - lookup('env', 'NYTT_DATEX_PASSWORD') | length > 0

        - name: Verify Entur source health and provenance invariants when tables exist
          ansible.builtin.shell: |
            set -euo pipefail
            docker compose --env-file .env.production exec -T postgres psql -U nytt -d nytt -v ON_ERROR_STOP=1 <<'SQL'
            DO $$
            DECLARE
              entur_source_health_count integer;
              accidental_vehicle_source_items integer;
              accidental_official_events integer;
              accidental_entur_situations integer;
            BEGIN
              IF to_regclass('public.public_transport_vehicles') IS NULL
                 OR to_regclass('public.public_transport_service_alerts') IS NULL THEN
                RAISE NOTICE 'Skipping Entur verification because public transport tables do not exist yet.';
                RETURN;
              END IF;

              SELECT count(*) INTO entur_source_health_count
              FROM source_health
              WHERE source IN ('entur_vehicle_positions','entur_service_alerts')
                AND state='ok'
                AND last_checked_at > now() - interval '20 minutes';

              IF entur_source_health_count <> 2 THEN
                RAISE EXCEPTION 'Expected 2 healthy Entur source_health rows, found %', entur_source_health_count;
              END IF;

              SELECT count(*) INTO accidental_vehicle_source_items
              FROM source_items
              WHERE provider='entur_vehicle_positions'
                 OR (
                   provider='entur'
                   AND (
                     external_id LIKE 'entur-vehicle:%'
                     OR normalized_payload->>'source' = 'entur_vehicle_positions'
                     OR normalized_payload ? 'vehicleId'
                   )
                 );

              IF accidental_vehicle_source_items <> 0 THEN
                RAISE EXCEPTION 'Entur vehicle telemetry entered source_items: % rows', accidental_vehicle_source_items;
              END IF;

              SELECT count(*) INTO accidental_official_events
              FROM official_events
              WHERE source IN ('entur','entur_vehicle_positions','entur_service_alerts');

              IF accidental_official_events <> 0 THEN
                RAISE EXCEPTION 'Entur sources entered official_events: % rows', accidental_official_events;
              END IF;

              SELECT count(*) INTO accidental_entur_situations
              FROM situations
              WHERE payload->>'officialSource' IN ('entur','entur_vehicle_positions','entur_service_alerts')
                 OR payload->'activationBasis'->'sourceIds' ?| array['entur','entur_vehicle_positions','entur_service_alerts']
                 OR EXISTS (
                   SELECT 1
                   FROM jsonb_array_elements(COALESCE(payload->'evidence', '[]'::jsonb)) evidence
                   WHERE evidence->>'source' IN ('entur','entur_vehicle_positions','entur_service_alerts')
                 );

              IF accidental_entur_situations <> 0 THEN
                RAISE EXCEPTION 'Entur sources activated situations: % rows', accidental_entur_situations;
              END IF;
            END $$;
            SQL
          args:
            chdir: "{{ app_dir }}"
            executable: /bin/bash
          register: entur_verification
          until: entur_verification.rc == 0
          retries: 12
          delay: 10
          changed_when: false

        - name: Verify source item query sanity
          ansible.builtin.command: >-
            docker compose --env-file .env.production exec -T postgres psql -U nytt -d nytt
            -c "SELECT provider, kind, count(*) FROM source_items GROUP BY provider, kind ORDER BY provider, kind LIMIT 20;"
          args:
            chdir: "{{ app_dir }}"
          changed_when: false

        - name: Verify TravelTime rows are excluded from source items
          ansible.builtin.shell: |
            set -euo pipefail
            count="$(docker compose --env-file .env.production exec -T postgres psql -U nytt -d nytt -Atqc "SELECT count(*) FROM source_items WHERE provider='datex_travel_time' OR kind='travel_time';")"
            test "$count" -eq 0
          args:
            chdir: "{{ app_dir }}"
            executable: /bin/bash
          changed_when: false

      rescue:
        - name: Restore previous API image after failed candidate validation
          ansible.builtin.shell: docker image tag nytt-trondheim-api:previous nytt-trondheim-api:latest
          changed_when: true
          ignore_errors: true

        - name: Restore previous worker image after failed candidate validation
          ansible.builtin.shell: docker image tag nytt-trondheim-worker:previous nytt-trondheim-worker:latest
          changed_when: true
          ignore_errors: true

        - name: Restart previous API and worker after failed candidate validation
          ansible.builtin.command: docker compose --env-file .env.production up -d app worker
          args:
            chdir: "{{ app_dir }}"
          changed_when: true

        - name: Verify previous production health after rollback
          ansible.builtin.uri:
            url: "https://nytt.reidar.tech/health"
            return_content: true
          register: rollback_health
          until: (rollback_health.json | default({})).get('status') == "ok"
          retries: 6
          delay: 5

        - name: Fail deployment after rollback
          ansible.builtin.fail:
            msg: "Candidate validation failed; previous app/worker images were restored. Inspect logs for the failed candidate."

      always:
        - name: Remove canary container after deploy attempt
          community.docker.docker_container:
            name: nytt-trondheim-canary
            state: absent
