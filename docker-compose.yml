services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: nytt
      POSTGRES_USER: nytt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [database]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nytt -d nytt"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  migrate:
    build:
      context: .
      target: api
    image: nytt-trondheim-api:latest
    env_file: .env.production
    command: ["node", "apps/server/dist/db/migrate.js"]
    networks: [database]
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      target: api
    image: nytt-trondheim-api:latest
    restart: unless-stopped
    env_file: .env.production
    environment:
      UPLOAD_DIR: /data/uploads
    ports:
      - "127.0.0.1:${APP_PORT:-8090}:8080"
    volumes:
      - uploads:/data/uploads
      - ./runtime-status:/data/runtime-status:ro
    networks: [database, outbound]
    depends_on:
      postgres:
        condition: service_healthy
    security_opt: ["no-new-privileges:true"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"

  worker:
    build:
      context: .
      target: worker
    image: nytt-trondheim-worker:latest
    restart: unless-stopped
    env_file: .env.production
    networks: [database, outbound]
    depends_on:
      postgres:
        condition: service_healthy
    security_opt: ["no-new-privileges:true"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const pg=require('pg'); const client=new pg.Client({connectionString:process.env.DATABASE_URL}); client.connect().then(()=>client.query(\\\"SELECT 1 FROM worker_cycle_metrics WHERE id='latest' AND cycle_completed_at > now() - interval '2 hours'\\\")).then((result)=>process.exit(result.rowCount>0?0:1)).catch(()=>process.exit(1)).finally(()=>client.end().catch(()=>{}));\"",
        ]
      interval: 60s
      timeout: 10s
      start_period: 5m
      retries: 3
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.75"

networks:
  database:
    name: nytt_database
    internal: true
  outbound:
    name: nytt_outbound
    external: true

volumes:
  postgres-data:
    name: nytt_postgres_data
  uploads:
    name: nytt_uploads
